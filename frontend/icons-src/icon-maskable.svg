<!-- ccpipe app icon — "maskable" purpose for Android adaptive icons.
     No rounded corners — the launcher applies its own mask shape
     (circle, squircle, teardrop, …). Content lives in the central
     ~60% safe zone so the most aggressive masks don't crop the
     spark. Same colour palette and glyph as the "any" variant
     (icon.svg) for visual consistency. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5a524" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#f5a524" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="#0d0c08"/>
  <rect width="512" height="512" fill="url(#halo)"/>

  <!-- Spark mark scaled down to fit the central 60% (safe zone for
       aggressive launcher masks). Petals extend ±120 from centre. -->
  <g transform="translate(256 256)">
    <path d="M0 -120 L16 0 L0 120 L-16 0 Z" fill="#f5a524"/>
    <path d="M0 -120 L16 0 L0 120 L-16 0 Z" fill="#f5a524" transform="rotate(45)"/>
    <path d="M0 -120 L16 0 L0 120 L-16 0 Z" fill="#f5a524" transform="rotate(90)"/>
    <path d="M0 -120 L16 0 L0 120 L-16 0 Z" fill="#f5a524" transform="rotate(135)"/>
    <circle cx="0" cy="0" r="13" fill="#f5a524"/>
  </g>
</svg>
