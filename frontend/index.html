<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0d0c08" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- PNG-only favicons. SVG favicon removed because Firefox Android
         was using it as a fallback bitmap when creating PWA shortcuts
         (via createWithAdaptiveBitmap), producing a blank white tile
         on launchers that apply their own mask — Smart Launcher in
         particular. Chrome installs PWAs as WebAPKs and isn't
         affected. Browser tabs handle the PNGs fine. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <!-- iOS doesn't reliably render SVG apple-touch-icons; use the
         180×180 PNG that rsvg-convert generated from icon.svg. iOS
         applies its own rounded-corner mask on top. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- All fonts are self-hosted. The @font-face declarations are
         in src/styles.css and reference src/assets/fonts/<id>.woff2
         (Vite hashes those into dist/assets/ during build). woff2
         files load lazily — the browser only fetches one when CSS
         actually applies its font-family to rendered text. -->
    <title>ccpipe</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
