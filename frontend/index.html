<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0d0c08" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- PNG-only icons. SVG variants are intentionally absent: Firefox
         Android falls back to the SVG favicon when creating a PWA
         shortcut and renders a blank tile on launchers that apply
         their own mask. iOS likewise can't use SVG for apple-touch-
         icon. See frontend/icons-src/ for the design source. -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- All fonts are self-hosted. The @font-face declarations are
         in src/styles.css and reference src/assets/fonts/<id>.woff2
         (Vite hashes those into dist/assets/ during build). woff2
         files load lazily — the browser only fetches one when CSS
         actually applies its font-family to rendered text. -->
    <title>ccpipe</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
