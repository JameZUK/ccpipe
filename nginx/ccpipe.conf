# Sample nginx server block for ccpipe. Deploy to your existing nginx.
# Assumes nginx terminates TLS; backend listens on 127.0.0.1:8080.

server {
    listen 443 ssl http2;
    server_name ccpipe.lan;

    # ssl_certificate     /etc/ssl/private/ccpipe.crt;
    # ssl_certificate_key /etc/ssl/private/ccpipe.key;

    # WebSocket connection timeout — keep terminals alive for a day.
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Allow larger audio frames over WS.
    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
