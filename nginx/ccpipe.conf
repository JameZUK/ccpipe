# ─── ccpipe nginx config ──────────────────────────────────────────────
#
# Drop into /etc/nginx/sites-available/, symlink into sites-enabled/,
# `nginx -t && systemctl reload nginx`. Designed for the documented
# deployment: nginx terminates TLS in front of the ccpipe backend
# (which binds 0.0.0.0:8080).
#
# Edit the four marked spots:
#   1. server_name        (your hostname)
#   2. ssl_certificate*   (your cert / key paths)
#   3. proxy_pass         (127.0.0.1:8080 if co-located,
#                          http://<lan-ip>:8080 if nginx is off-host)
#   4. The companion systemd drop-in MUST list this nginx host's IP in
#      `--forwarded-allow-ips=…` — see README §"Reverse proxy".
#
# Pair with these ccpipe env vars (typically in
# ~/.config/systemd/user/ccpipe.service.d/tls.conf):
#   CCPIPE_BEHIND_TLS=1
#   CCPIPE_TRUSTED_HOSTS=<server_name>
#   CCPIPE_ALLOWED_ORIGINS=https://<server_name>


# ─── Plain HTTP → 301 to HTTPS ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ccpipe.example.com;   # EDIT
    # ACME challenges if you use certbot, otherwise just redirect.
    location /.well-known/acme-challenge/ { root /var/lib/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}


# ─── HTTPS ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ccpipe.example.com;   # EDIT

    # TLS material — EDIT to point at your cert + key.
    ssl_certificate     /etc/letsencrypt/live/ccpipe.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ccpipe.example.com/privkey.pem;

    # Modern TLS: 1.2 + 1.3, no client-driven cipher choice. Mozilla
    # "intermediate" preset is fine for any browser younger than 2018.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:ccpipe_ssl:10m;
    ssl_session_timeout 1d;

    # OCSP stapling. Cheap, removes the per-connection CA round-trip.
    ssl_stapling        on;
    ssl_stapling_verify on;

    # The ccpipe backend already emits HSTS, X-Frame-Options,
    # X-Content-Type-Options, Referrer-Policy, Permissions-Policy and
    # the full CSP under CCPIPE_BEHIND_TLS=1 — so we DON'T also emit
    # them here. Duplicate Strict-Transport-Security headers are honoured
    # by browsers as just the FIRST one (per RFC 6797 §8.1), which had
    # been silently dropping the `preload` directive when both layers
    # were sending different policies. Same misconfiguration smell for
    # X-Frame-Options: contradictory `DENY` + `SAMEORIGIN` from two
    # layers leaves it undefined per RFC 7034.
    #
    # If you front this nginx with another proxy (Cloudflare etc.)
    # that ALSO injects security headers, align them there too — only
    # the FIRST instance of each header reaches the browser intact.

    # ─── WebSocket + audio tuning ─────────────────────────────────────
    # Terminals stay open for hours — keep proxy timeouts long enough
    # to ride out idle periods without nginx pulling the rug.
    proxy_read_timeout    86400s;   # 1 day
    proxy_send_timeout    86400s;
    proxy_connect_timeout 30s;

    # Audio uploads + file-panel uploads. Default ccpipe upload cap is
    # 50 MiB (config.py FsConfig.upload_limit_mb), so size this header
    # generously to match — a smaller value here would silently 413 at
    # nginx before the backend's own size check could fire, confusing
    # the user. If you tighten upload_limit_mb in config.json, tighten
    # this too.
    client_max_body_size 64m;

    # WS frames are small and bursty. Disable buffering on the proxy
    # path so xterm keystrokes don't sit in a kernel buffer waiting
    # for a flush. Doesn't affect HTTP responses (which Vite serves
    # with their own caching headers anyway).
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        # EDIT: 127.0.0.1:8080 if nginx and ccpipe live on the same
        # host; http://<lan-ip>:8080 if nginx is on a different LAN
        # host (the documented deployment).
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;

        # Forwarded headers. Honored by uvicorn ONLY when launched
        # with `--proxy-headers --forwarded-allow-ips=<this-host>`;
        # see the systemd drop-in in the README. The allow-list is
        # what stops an attacker hitting :8080 directly from spoofing
        # X-Forwarded-For to bypass the per-IP login throttle.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade. Both headers are required for /ws to work.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
